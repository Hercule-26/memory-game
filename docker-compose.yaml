services:
  backend:
    build: ./memory-backend
    container_name: memory-backend
    ports:
      - "${BACKEND_PORT}:3000"
    environment:
      - NODE_ENV=production
      - SESSION_SECRET=${SERVER_SECRET}
      - SERVER_HOST=${SERVER_HOST}
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${PROJECT_TAG}-backend.rule=Host(`${SERVER_HOST}`)"
      - "traefik.http.routers.${PROJECT_TAG}-backend.entrypoints=web"
      - "traefik.http.services.${PROJECT_TAG}-backend.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik-network"
    restart: unless-stopped

  frontend:
    build:
      context: ./memory-frontend
      args:
        - VITE_API_URL=${BACKEND_API_URL}
        - VITE_SOCKET_URL=${BACKEND_SOCKET_URL}
    ports:
      - "${FRONTEND_PORT}:80"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${PROJECT_TAG}-frontend.rule=Host(`${DOMAIN_URL}`)"
      - "traefik.http.routers.${PROJECT_TAG}-frontend.entrypoints=web"
      - "traefik.http.services.${PROJECT_TAG}-frontend.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik-network"
    restart: unless-stopped

networks:
  traefik-network:
    external: true
